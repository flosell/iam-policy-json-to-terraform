name: main pipeline
permissions: {}
on:
  push:
    branches: [master, ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [master]
env:
  TERM: xterm
jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4
      - run: ./go check
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4
      - name: Run tests
        run: ./go test
  cli-build:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4
      - name: Build CLI
        run: ./go cli_build
  web-build:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4
      - name: Install tools
        run: |
          ./go tools_web
      - name: Build web version
        run: ./go web_build
      - name: Store website build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: website
          path: |
            web/version.txt
            web/index.html
            web/app.css
            web/app.js
            web/wasm.wasm
            web/wasm_exec.js
            web/img/GitHub-Mark-Light-32px.png
      - name: Store build version
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: version
          path: |
            web/version.txt
  web-test:
    runs-on: ubuntu-24.04
    needs: web-build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Retrieve website build from previous step
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: website
          path: web
      - uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4
      - name: Install tools
        run: |
          ./go tools_web
      - name: Run E2E tests
        run: ./go web_e2e
      - name: Run visual regression tests
        run: ./go web_visual_regression_test
      - name: Store Visual Regression test report
        if: ${{failure()}}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: visual regression test report
          path: |
            web/backstop_data/*
  web-deploy:
    runs-on: ubuntu-24.04
    needs: web-test
    if: ${{ github.ref == 'refs/heads/master' }}
    permissions:
      pages: write
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
          path: pages
          persist-credentials: true # required here for deployment
      - name: Retrieve website build from previous step
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: website
          path: web
      - name: Set GitHub Actions Bot as GitHub user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Deploy to GitHub Pages
        run: ./go web_deploy pages
  web-test-after-deployment:
    runs-on: ubuntu-24.04
    needs: web-deploy
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4
      - name: Retrieve website build version from previous step
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: version
          path: web
      - name: Install tools
        run: |
          ./go tools_web
      - name: Wait for version deployed
        run: ./go wait_for_deployed
        timeout-minutes: 5
      - name: Run E2E tests
        run: ./go web_e2e_deployed
  test-readme:
    runs-on: ubuntu-24.04
    needs: cli-build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Test if readme is written well
        run: ./go test_readme
